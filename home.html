<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resort Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    position: relative;
}
.hero h1 {
    font-size: 70px;
    margin-bottom: 20px;
    font-family: 'Playfair Display', serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
}

/* Overlay */
.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 1;
}

/* Content */
.hero-content {
    position: relative;
    z-index: 2;
}

    

/* BOOK NOW BUTTON */
.book-btn {
    padding: 15px 30px;
    background-color: #d4af37;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: white;
    border-radius: 5px;
    transition: 0.3s;
}

.book-btn:hover {
    background-color: #b8962e;
}

/* NAVBAR */
.navbar {
    color: hsl(0, 0%, 100%);
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    width: 100%;
    max-width: 1200px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 15px 30px;

    background: hsla(0, 0%, 38%, 0.339);
    backdrop-filter: blur(10px);

    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);

    z-index: 10;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    font-family: 'Playfair Display', serif;
    letter-spacing: 2px;
}

.menu {
    cursor: pointer;
}
.nav-links 
{
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: 500;
    position: relative;
    transition: all 0.3s ease;
}

/* GOLD UNDERLINE EFFECT */
.nav-links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #d4af37, #f5d76e);
    left: 0;
    bottom: -6px;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a:hover {
    color: #f5d76e;
       text-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Mountain Shadow</div>
    <div class="nav-links">
    <a href="#">Gallery</a>
    <a href="#">About</a>
    <a href="#">Restaurant</a>
    <a href="#">Reviews</a>
    <a href="#">Awards</a>
    <a href="#">Contact</a>
</div>
</div>

<!-- HERO SECTION -->
<div class="hero">
    <div class="hero-content">
        <h1>Mountain Shadow</h1>
        <h1>Luxury Resort Experience</h1>
        <button class="book-btn" onclick="goToBooking()">Book Now</button>
    </div>
</div>

<script>
function goToBooking() {
    alert("Navigate to Booking Page");
    // later you can redirect:
    // window.location.href = "booking.html";
}
</script>

</body>
</html>
