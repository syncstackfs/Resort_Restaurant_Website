{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0a0a0a;
            font-family:Arial, sans-serif;
            min-height:100vh;
        }

        /* ================= CONFIRMATION OVERLAY ================= */

        .confirmation{
            position:fixed;
            inset:0;
            z-index:2000;
            background:rgba(10,10,10,0.96);
            backdrop-filter:blur(12px);

            display:flex;
            justify-content:center;
            align-items:center;

            padding:2rem;
        }

        .confirmation__inner{
            text-align:center;
            border:1px solid rgba(212,175,55,0.5);
            padding:60px 40px;
            border-radius:16px;
            background:#111;
            max-width:500px;
            width:100%;
        }

        .confirmation__icon{
            font-size:60px;
            margin-bottom:20px;
        }

      .confirmation__title{
            font-size:42px;
            color:#c9a84c;
            margin-bottom:20px;
        }
        .confirmation__text{
            color:rgba(255,255,255,0.7);
            font-size:18px;
            line-height:1.8;
            margin-bottom:35px;
        }

        .btn-home{
            display:inline-block;
            padding:14px 35px;
            background:#e4c76b;
            color:black;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-home:hover{
            transform:translateY(-3px);
        }

        @media(max-width:520px){

            .confirmation__title{
                font-size:30px;
            }

            .confirmation__text{
                font-size:15px;
            }

            .confirmation__inner{
                padding:40px 25px;
            }

        }

    </style>

</head>

<body>

    <div class="confirmation">

        <div class="confirmation__inner">

            <div class="confirmation__icon">
                ✅
            </div>

            <h1 class="confirmation__title">
                Reservation Confirmed
            </h1>

            <p class="confirmation__text">
            Your booking request has been received.<br>
            Thank you for choosing Mountain Shadow Resort.
            </p>

            <a href="{% url 'home' %}" class="btn-home">
                Back To Home
            </a>

        </div>

    </div>

</body>
</html>
